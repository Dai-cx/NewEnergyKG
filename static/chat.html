<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新能源知识图谱 - 智能问答助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --secondary: #3b82f6;
            --secondary-dark: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --user-bubble: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            --bot-bubble: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        .brand-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .brand-text h1 {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .brand-text p {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 999px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            position: relative;
        }

        .status-item.online .status-dot {
            background: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
            animation: pulse 2s infinite;
        }

        .status-item.offline .status-dot {
            background: #ef4444;
        }

        .status-item.checking .status-dot {
            background: #f59e0b;
            animation: pulse 1.5s infinite;
        }

        .home-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .home-link:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-dark);
        }

        /* Main Chat */
        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-container {
            flex: 1;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 500px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }

        .welcome {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease;
        }

        .welcome-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: var(--shadow);
        }

        .welcome-avatar svg {
            width: 26px;
            height: 26px;
            fill: white;
        }

        .welcome-content {
            background: var(--bot-bubble);
            padding: 18px 20px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            max-width: 80%;
        }

        .welcome-content h2 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .welcome-content p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInUp 0.4s ease;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .message.bot .message-avatar {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        .message.user .message-avatar {
            background: var(--secondary);
            color: white;
        }

        .message-content {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.bot .message-content {
            background: var(--bot-bubble);
            color: var(--text);
            border-top-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--user-bubble);
            color: white;
            border-top-right-radius: 4px;
        }

        .message-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 6px;
            text-align: right;
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 18px 20px;
            background: var(--bot-bubble);
            border-radius: 18px;
            border-top-left-radius: 4px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        /* Quick Questions */
        .quick-questions {
            padding: 0 24px 16px;
        }

        .quick-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-chip {
            padding: 8px 14px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .quick-chip:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-dark);
            transform: translateY(-1px);
        }

        /* Input Area */
        .input-area {
            padding: 16px 24px 24px;
            border-top: 1px solid var(--border);
            background: white;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .message-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            color: var(--text);
            resize: none;
            max-height: 120px;
            min-height: 24px;
            padding: 8px 0;
            font-family: inherit;
            outline: none;
        }

        .message-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: var(--shadow);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Error / Info toasts */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 200;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .header-content { flex-wrap: wrap; }
            .status-bar { order: 3; width: 100%; justify-content: flex-start; }
            .status-item { font-size: 0.75rem; padding: 4px 10px; }
            main { padding: 16px; }
            .messages { padding: 16px; }
            .message-content { max-width: 85%; }
            .welcome-content { max-width: 90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div class="brand-text">
                    <h1>智能问答助手</h1>
                    <p>新能源知识图谱 · AI 问答</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-item checking" id="llm-status">
                    <span class="status-dot"></span>
                    <span>LLM 已启用</span>
                </div>
                <div class="status-item checking" id="neo4j-status">
                    <span class="status-dot"></span>
                    <span>Neo4j 已连接</span>
                </div>
            </div>
            <a href="/" class="home-link" title="返回启动器">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            </a>
        </div>
    </header>

    <main>
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="welcome">
                    <div class="welcome-avatar">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <div class="welcome-content">
                        <h2>您好！我是新能源知识图谱问答助手</h2>
                        <p>我可以帮您解答新能源领域的技术、企业、材料、应用等问题。点击下方快捷问题，或直接输入您的问题。</p>
                    </div>
                </div>
            </div>

            <div class="quick-questions">
                <div class="quick-title">预设问题</div>
                <div class="quick-chips" id="quick-chips">
                    <button class="quick-chip">什么是光伏逆变器？</button>
                    <button class="quick-chip">磷酸铁锂电池有哪些优点？</button>
                    <button class="quick-chip">磷酸铁锂电池有哪些公司？</button>
                    <button class="quick-chip">光伏逆变器和锂电池比较？</button>
                    <button class="quick-chip">有哪些储能技术？</button>
                    <button class="quick-chip">氢燃料电池汽车的应用？</button>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="message-input" id="message-input" rows="1" placeholder="请输入您的问题..." maxlength="500"></textarea>
                    <button class="send-btn" id="send-btn" title="发送">
                        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const quickChips = document.getElementById('quick-chips');
        const toastEl = document.getElementById('toast');
        const llmStatus = document.getElementById('llm-status');
        const neo4jStatus = document.getElementById('neo4j-status');

        let isProcessing = false;

        function getTimestamp() {
            return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function showToast(message, duration = 3000) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), duration);
        }

        function setStatus(element, status) {
            element.classList.remove('online', 'offline', 'checking');
            element.classList.add(status);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function appendUserMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message user';
            msg.innerHTML = `
                <div class="message-avatar">我</div>
                <div>
                    <div class="message-content">${escapeHtml(text)}</div>
                    <div class="message-time">${getTimestamp()}</div>
                </div>
            `;
            messagesEl.appendChild(msg);
            scrollToBottom();
        }

        function appendBotMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message bot';
            msg.innerHTML = `
                <div class="message-avatar">AI</div>
                <div>
                    <div class="message-content">${escapeHtml(text)}</div>
                    <div class="message-time">${getTimestamp()}</div>
                </div>
            `;
            messagesEl.appendChild(msg);
            scrollToBottom();
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'message bot';
            typing.id = 'typing-indicator';
            typing.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="typing">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            messagesEl.appendChild(typing);
            scrollToBottom();
        }

        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function sendQuestion(question) {
            if (isProcessing || !question.trim()) return;

            isProcessing = true;
            sendBtn.disabled = true;
            inputEl.disabled = true;

            appendUserMessage(question);
            inputEl.value = '';
            inputEl.style.height = 'auto';
            showTyping();

            try {
                const response = await fetch('/qa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question.trim() })
                });

                hideTyping();

                if (!response.ok) {
                    throw new Error(`服务器响应错误：${response.status}`);
                }

                const data = await response.json();
                const answer = data.answer || '抱歉，没有获取到回答内容。';
                appendBotMessage(answer);

                if (data.source) {
                    console.log('回答来源：', data.source, '模型：', data.llm_model, '耗时：', data.response_time_ms + 'ms');
                }
            } catch (error) {
                hideTyping();
                appendBotMessage('抱歉，请求处理失败：' + error.message + '\n\n请确认后端服务已启动（python -m qa.main）。');
                showToast('请求失败：' + error.message);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                inputEl.disabled = false;
                inputEl.focus();
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/status', { method: 'GET', cache: 'no-store' });
                if (response.ok) {
                    const data = await response.json();
                    setStatus(llmStatus, data.llm_available ? 'online' : 'offline');
                } else {
                    setStatus(llmStatus, 'offline');
                }
            } catch (error) {
                setStatus(llmStatus, 'offline');
            }

            try {
                const response = await fetch('/kg/status', { method: 'GET', cache: 'no-store' });
                setStatus(neo4jStatus, response.ok ? 'online' : 'offline');
            } catch (error) {
                setStatus(neo4jStatus, 'offline');
            }
        }

        sendBtn.addEventListener('click', () => sendQuestion(inputEl.value));

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuestion(inputEl.value);
            }
        });

        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
        });

        quickChips.addEventListener('click', (e) => {
            if (e.target.classList.contains('quick-chip')) {
                sendQuestion(e.target.textContent);
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            setInterval(checkStatus, 30000);
            inputEl.focus();
        });
    </script>
</body>
</html>
