<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新能源知识图谱问答助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify 防止 XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="title-group">
                    <h1>新能源知识图谱问答助手</h1>
                    <span class="subtitle">基于大语言模型的智能问答</span>
                </div>
            </div>
            <div class="header-right">
                <div class="mode-switch">
                    <button class="mode-btn active" data-mode="single" title="普通单轮问答">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>单轮问答</span>
                    </button>
                    <button class="mode-btn" data-mode="compare" title="对比纯 LLM 与 KG+RAG 回答">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18M9 21V9"/>
                        </svg>
                        <span>KG 对比</span>
                    </button>
                </div>
                <button class="icon-btn clear-btn" title="清空对话">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="chat-main">
            <!-- 欢迎区 -->
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-avatar">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2>你好，我是新能源知识图谱问答助手</h2>
                <p>我可以回答关于光伏、储能、风电、氢能、核能、新能源汽车等领域的问题。</p>
                <div class="example-questions">
                    <h3>试试这些问题</h3>
                    <div class="example-cards" id="exampleCards">
                        <!-- 示例问题由 JS 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 消息列表 -->
            <div class="messages-container" id="messagesContainer"></div>
        </main>

        <!-- 输入区 -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="questionInput"
                    class="question-input"
                    placeholder="请输入新能源领域的问题，按 Enter 发送，Shift+Enter 换行..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn" title="发送">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">
                <span> powered by qwen-turbo · 第二阶段将接入 Neo4j 知识图谱</span>
            </div>
        </footer>
    </div>

    <!-- 加载动画模板 -->
    <template id="loadingTemplate">
        <div class="message assistant-message loading-message">
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="message-content">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="/static/js/app.js"></script>
</body>
</html>
